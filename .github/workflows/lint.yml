name: Linters

on:
  # Runs when any file is changed
  push:
    branches: '**' # Don't run when pushing tags
  pull_request:

jobs:
  editorconfig:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - name: Checkout commit
      uses: actions/checkout@v6

    - name: Set up editorconfig-checker
      uses: editorconfig-checker/action-editorconfig-checker@v2.2.0

    - name: Run editorconfig-checker
      # GitHub actions annotations does not support terminal color codes
      run: editorconfig-checker -no-color -format github-actions -exclude pester/web/
