name: Linters

on:
  # Runs when any file is changed
  push:
    branches: '**' # Don't run when pushing tags
  pull_request:

jobs:
  # Check modified paths, which can later be used to filter jobs or steps
  setup-variables:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    # Set job outputs to values from filter step
    outputs:
      psscriptanalyzer_changed: ${{ steps.paths-filter.outputs.psscriptanalyzer_changed }}
      psscriptanalyzer_changed_files: ${{ steps.paths-filter.outputs.psscriptanalyzer_changed_files }}
      psscriptanalyzer_all: ${{ steps.paths-filter.outputs.psscriptanalyzer_all }}
      psscriptanalyzer_all_files: ${{ steps.psscriptanalyzer-all-files.outputs.psscriptanalyzer_all_files }}
    steps:
    - name: Checkout commit
      uses: actions/checkout@v6

    - name: Setup variables with paths-filter
      uses: dorny/paths-filter@v3
      id: paths-filter
      with:
        # khd.ps1 is already checked with PSScriptAnalyzer in the check khd workflow
        filters: |
          psscriptanalyzer_changed:
            - added|modified: '**.ps?(d|m)1'
            - '!khd.ps1'
          psscriptanalyzer_all:
            - 'PSScriptAnalyzerSettings.psd1'
        # Default value 'some' requires only one pattern to match, so a negated pattern ends up matching
        # everything not-negated while 'every' requires all patterns to match
        predicate-quantifier: 'every'
        list-files: json

    - name: Setup variable psscriptanalyzer_all_files
      id: psscriptanalyzer-all-files
      if: ${{ steps.paths-filter.outputs.psscriptanalyzer_all == 'true' }}
      # khd.ps1 is already checked with PSScriptAnalyzer in the check khd workflow
      run: echo "psscriptanalyzer_all_files=$(git ls-files --full-name -- ':/*.ps1' ':/*.psm1' ':/*.psd1' ':/!khd.ps1' | jq -MRnc '[inputs]')" >> $GITHUB_OUTPUT

  editorconfig:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - name: Checkout commit
      uses: actions/checkout@v6

    - name: Set up editorconfig-checker
      uses: editorconfig-checker/action-editorconfig-checker@v2.1.0

    - name: Run editorconfig-checker
      # GitHub actions annotations does not support terminal color codes
      run: editorconfig-checker -no-color -format github-actions -exclude pester/web/

  psscriptanalyzer-changed:
    needs: setup-variables
    if: ${{ needs.setup-variables.outputs.psscriptanalyzer_changed == 'true' && needs.setup-variables.outputs.psscriptanalyzer_all != 'false' }}
    strategy:
      fail-fast: false
      matrix:
        script-path: ${{ fromJSON(needs.setup-variables.outputs.psscriptanalyzer_changed_files) }}
    uses: ./.github/workflows/psscriptanalyzer.yml
    with:
      script-path: ${{ matrix.script-path }}

  psscriptanalyzer-all:
    needs: setup-variables
    if: ${{ needs.setup-variables.outputs.psscriptanalyzer_all == 'true'}}
    strategy:
      fail-fast: false
      matrix:
        script-path: ${{ fromJSON(needs.setup-variables.outputs.psscriptanalyzer_all_files) }}
    uses: ./.github/workflows/psscriptanalyzer.yml
    with:
      script-path: ${{ matrix.script-path }}
