name: Linters

on:
  # Runs when any file is changed
  push:
    branches: '**' # Don't run when pushing tags
  pull_request:

permissions:
  contents: read

concurrency:
  # Runs on any commit from upstream repo and only head commit from pull request
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  editorconfig:
    name: EditorConfig
    timeout-minutes: 5
    runs-on: ubuntu-slim
    steps:
    - name: Checkout commit
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false

    - name: Set up editorconfig-checker
      uses: editorconfig-checker/action-editorconfig-checker@840e866d93b8e032123c23bac69dece044d4d84c # v2.2.0

    - name: Run editorconfig-checker
      # GitHub actions annotations does not support terminal color codes
      run: editorconfig-checker -no-color -format github-actions -exclude pester/web/
