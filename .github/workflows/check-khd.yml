name: Check khd

on:
  # Runs when khd.ps1 is changed, on default branch or any pull request
  push:
    branches: [ "main" ]
    paths:
      - 'khd.ps1'
  pull_request:
    paths:
      - 'khd.ps1'

jobs:
  check-khd:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout khd.ps1
      uses: actions/checkout@v6
      with :
        sparse-checkout: khd.ps1
        sparse-checkout-cone-mode: false

    # Adapted from Polly lint workflow : https://github.com/App-vNext/Polly/blob/main/.github/workflows/lint.yml
    - name: Check khd.ps1
      shell: pwsh
      run: |
        $issues = Invoke-ScriptAnalyzer -Path './khd.ps1' -ReportSummary
        foreach ($issue in $issues) {
          $severity = $issue.Severity.ToString()
          $level = $severity -eq 'Error' ? 'error' : $severity -eq 'Warning' ? 'warning' : 'notice'
          Write-Output "::$level file=$($issue.ScriptName),line=$($issue.Line),title=PSScriptAnalyzer::$($issue.Message)"
        }
        exit $issues.Count
