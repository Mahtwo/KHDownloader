name: Check khd

on:
  # Runs when khd.ps1 or PSScriptAnalyzerSettings.psd1 are changed
  push:
    branches: '**' # Don't run when pushing tags
    paths:
      - 'khd.ps1'
      - 'PSScriptAnalyzerSettings.psd1'
  pull_request:
    paths:
      - 'khd.ps1'
      - 'PSScriptAnalyzerSettings.psd1'

jobs:
  check-khd:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - name: Checkout khd.ps1 and PSScriptAnalyzerSettings.psd1
      uses: actions/checkout@v6
      with :
        sparse-checkout: |
          khd.ps1
          PSScriptAnalyzerSettings.psd1
        sparse-checkout-cone-mode: false

    # Adapted from Polly lint workflow : https://github.com/App-vNext/Polly/blob/2b569d48f8e6aa141bf4ecd90728d213d380aeb0/.github/workflows/lint.yml#L67
    - name: Check khd.ps1
      shell: pwsh -NonInteractive -NoProfile -Command ". '{0}'"
      # Cannot capture summary from -ReportSummary so we run pwsh in another process and capture its output
      # Output can be of type string or array depending on number of lines (string if 0 issues)
      run: |
        $command = @'
          $issues = Invoke-ScriptAnalyzer -Path './khd.ps1' -ReportSummary
          foreach ($issue in $issues) {
            $severity = $issue.Severity.ToString()
            $level = $severity -eq 'Error' ? 'error' : $severity -eq 'Warning' ? 'warning' : 'notice'
            Write-Output "::$level file=$($issue.ScriptName),line=$($issue.Line),col=$($issue.Column),title=PSScriptAnalyzer::$($issue.Message)"
          }
          exit $issues.Count
        '@
        $output = pwsh -NonInteractive -NoProfile -Command $command
        if ($LASTEXITCODE) {
          "### $($output[0])" >> $env:GITHUB_STEP_SUMMARY
          Write-Output $output[1..($output.Count - 1)]
        }
        exit $LASTEXITCODE

  call-refresh-latest-release:
    needs: check-khd
    # Don't refresh release on pull request or not main branch
    if: ${{ github.event_name == 'push' && github.ref == github.event.repository.default_branch }}
    permissions:
      contents: write
    uses: ./.github/workflows/refresh-latest-release.yml
